<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>رواسخ أكاديمية</title>

<!-- ============================================================
     رواسخ أكاديمية
     ملف واحد شامل: HTML + CSS + JS (بنفس فلسفة "نافورة")
     الأقسام مقسّمة بعلامات =====[ SECTION ]===== لتسهيل التعديل الجراحي لاحقًا
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase (compat SDK — أسهل في ملف واحد بدون build step) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<!-- Agora RTC SDK -->
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>

<style>
/* =====[ SECTION: DESIGN TOKENS ]===== */
:root{
  /* لوحة الألوان — أخضر زمردي غامق / ذهبي / كريمي */
  --emerald-950:#07231a;
  --emerald-900:#0c3327;
  --emerald-800:#123f30;
  --emerald-700:#1a5240;
  --emerald-600:#236b55;
  --gold-500:#c9a227;
  --gold-400:#dab84a;
  --gold-300:#e8cd7a;
  --cream-50:#faf6ec;
  --cream-100:#f3ecda;
  --cream-200:#e8dcc0;
  --ink-900:#1b241f;
  --ink-600:#4c5850;
  --danger:#b3423a;
  --success:#2f7d5e;
  --warn:#c9822a;

  --bg:var(--cream-50);
  --surface:#ffffff;
  --surface-2:var(--cream-100);
  --text:var(--ink-900);
  --text-dim:var(--ink-600);
  --border:rgba(27,36,31,0.10);
  --accent:var(--emerald-800);
  --accent-2:var(--gold-500);
  --shadow:0 10px 30px -12px rgba(11,41,31,0.25);
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:10px;
  --font-display:'Amiri', serif;
  --font-body:'Cairo', sans-serif;
}
[data-theme="dark"]{
  --bg:var(--emerald-950);
  --surface:#0e2b21;
  --surface-2:#123527;
  --text:#f2ead2;
  --text-dim:#a9baaf;
  --border:rgba(242,234,210,0.10);
  --accent:var(--gold-400);
  --accent-2:var(--gold-300);
  --shadow:0 10px 34px -12px rgba(0,0,0,0.55);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:var(--font-body); direction:rtl; overflow-x:hidden;
  transition:background .35s ease, color .35s ease;
}
h1,h2,h3,.display{font-family:var(--font-display);}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit; text-decoration:none;}
::selection{background:var(--accent-2); color:var(--emerald-950);}

/* شريط تمرير هادئ */
::-webkit-scrollbar{width:6px; height:6px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:10px;}

/* =====[ SECTION: ZIER (SIGNATURE MOTIF) — سبحة رقمية كمؤشر تقدّم ]===== */
.tasbih{display:flex; align-items:center; gap:4px; direction:ltr;}
.tasbih .bead{width:9px; height:9px; border-radius:50%; background:var(--border); transition:all .4s ease;}
.tasbih .bead.filled{background:linear-gradient(160deg,var(--gold-400),var(--gold-500)); box-shadow:0 0 0 3px rgba(201,162,39,0.15);}
.tasbih .imam{width:13px; height:13px; border-radius:3px; background:var(--accent); transform:rotate(45deg);}

/* =====[ SECTION: APP SHELL ]===== */
#app{min-height:100vh; display:flex; flex-direction:column; position:relative;}
.screen{display:none; flex:1; flex-direction:column; animation:fadeSlide .45s cubic-bezier(.2,.8,.2,1);}
.screen.active{display:flex;}
@keyframes fadeSlide{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){ .screen{animation:none;} *{transition-duration:.01ms !important;} }

.container{width:100%; max-width:520px; margin:0 auto; padding:22px 18px 100px;}
.container.wide{max-width:920px;}

/* =====[ SECTION: RESPONSIVE / SCREEN SIZE FIXES ]===== */
/* بدل استخدام 100vh فقط (بيعمل مشاكل على موبايل مع شريط المتصفح)، بنستخدم dvh لما تكون متاحة */
.chat-screen{height:100vh;}
@supports (height: 100dvh){ .chat-screen{height:100dvh;} }
.call-overlay{min-height:100vh;}
@supports (height: 100dvh){ .call-overlay{min-height:100dvh;} }
#app{min-height:100vh;}
@supports (height: 100dvh){ #app{min-height:100dvh;} }
.loader-wrap{height:100vh;}
@supports (height: 100dvh){ .loader-wrap{height:100dvh;} }

/* تابلت */
@media (min-width:700px){
  .container{max-width:640px; padding:26px 24px 110px;}
  .container.wide{max-width:960px;}
  .role-pick{gap:18px;}
  .stats-grid{gap:16px;}
}
/* شاشات كبيرة / كمبيوتر */
@media (min-width:1024px){
  body{background:var(--surface-2);}
  #app{max-width:1180px; margin:0 auto; box-shadow:0 0 60px rgba(0,0,0,.08); background:var(--bg); min-height:100vh;}
  .container{max-width:680px;}
  .container.wide{max-width:1040px;}
  .bottom-nav{max-width:1180px; margin:0 auto; left:0; right:0;}
}
/* شاشات صغيرة جدًا (أقل من 360px) */
@media (max-width:359px){
  .container{padding:16px 12px 92px;}
  .brand-hero{padding:34px 10px 18px;}
  .stats-grid{gap:8px;}
  .stat-box b{font-size:22px;}
}

/* =====[ SECTION: TOP BAR ]===== */
.topbar{
  position:sticky; top:0; z-index:30; background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px; padding:14px 18px;
}
.topbar h1{font-size:19px; margin:0; flex:1;}
.icon-btn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--surface-2);
  display:flex; align-items:center; justify-content:center; color:var(--text); font-size:16px; flex-shrink:0;
}
.icon-btn:active{transform:scale(.92);}
.back-btn{transform:scaleX(-1);}

/* =====[ SECTION: BUTTONS / FORMS ]===== */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:14px 20px; border-radius:14px; border:none; font-weight:700; font-size:15px;
  background:var(--accent); color:var(--surface); width:100%; transition:transform .15s ease, opacity .15s ease;
}
[data-theme="dark"] .btn{color:var(--emerald-950);}
.btn:active{transform:scale(.97);}
.btn.secondary{background:transparent; color:var(--accent); border:1.5px solid var(--accent);}
.btn.ghost{background:var(--surface-2); color:var(--text);}
.btn.danger{background:var(--danger); color:#fff;}
.btn.sm{padding:9px 14px; font-size:13px; width:auto; border-radius:10px;}
.btn:disabled{opacity:.5; pointer-events:none;}

.field{margin-bottom:14px;}
.field label{display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px; font-weight:600;}
.field input, .field select, .field textarea{
  width:100%; padding:13px 15px; border-radius:12px; border:1.5px solid var(--border);
  background:var(--surface); color:var(--text); font-size:15px; outline:none; transition:border .2s ease;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical; min-height:70px;}

.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px; box-shadow:var(--shadow);}
.chip{display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:999px; font-size:12px; font-weight:700;}
.chip.ok{background:rgba(47,125,94,.15); color:var(--success);}
.chip.warn{background:rgba(201,130,42,.15); color:var(--warn);}
.chip.danger{background:rgba(179,66,58,.15); color:var(--danger);}
.chip.neutral{background:var(--surface-2); color:var(--text-dim);}

.divider-orn{display:flex; align-items:center; gap:10px; margin:22px 0; color:var(--text-dim);}
.divider-orn:before, .divider-orn:after{content:""; flex:1; height:1px; background:var(--border);}

.toast{
  position:fixed; bottom:100px; right:50%; transform:translateX(50%);
  background:var(--ink-900); color:#fff; padding:12px 22px; border-radius:14px; font-size:14px; z-index:200;
  box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:all .35s ease; max-width:90%; text-align:center;
}
.toast.show{opacity:1; bottom:110px;}

.loader-wrap{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:18px; background:var(--bg);}
.loader-ring{width:56px; height:56px; border-radius:50%; border:4px solid var(--border); border-top-color:var(--accent); animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* =====[ SECTION: AUTH SCREENS ]===== */
.brand-hero{text-align:center; padding:50px 20px 30px;}
.brand-hero .logo{
  width:84px; height:84px; margin:0 auto 16px; border-radius:24px;
  background:linear-gradient(155deg,var(--emerald-700),var(--emerald-900));
  display:flex; align-items:center; justify-content:center; font-size:38px; color:var(--gold-400); box-shadow:var(--shadow);
}
.brand-hero h1{font-size:30px; margin:0 0 6px; color:var(--accent);}
.brand-hero p{color:var(--text-dim); margin:0; font-size:14px;}

.role-pick{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:24px 0;}
.role-card{
  background:var(--surface); border:2px solid var(--border); border-radius:var(--radius-md); padding:22px 14px;
  text-align:center; display:flex; flex-direction:column; align-items:center; gap:8px;
}
.role-card .emoji{font-size:30px;}
.role-card.selected{border-color:var(--accent); background:var(--surface-2);}
.role-card b{font-size:15px;}
.role-card span{font-size:12px; color:var(--text-dim);}

.tabs-switch{display:flex; background:var(--surface-2); border-radius:14px; padding:4px; margin-bottom:20px;}
.tabs-switch button{flex:1; padding:11px; border:none; background:transparent; border-radius:11px; font-weight:700; color:var(--text-dim); font-size:14px;}
.tabs-switch button.active{background:var(--surface); color:var(--accent); box-shadow:0 2px 8px rgba(0,0,0,.08);}

/* =====[ SECTION: BOTTOM NAV (شبيه واتساب) ]===== */
.bottom-nav{
  position:fixed; bottom:0; right:0; left:0; z-index:40; background:var(--surface); border-top:1px solid var(--border);
  display:flex; padding:8px 6px calc(8px + env(safe-area-inset-bottom));
}
.bottom-nav button{
  flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:6px 2px; color:var(--text-dim); font-size:11px; font-weight:600; position:relative;
}
.bottom-nav button .ic{font-size:20px;}
.bottom-nav button.active{color:var(--accent);}
.bottom-nav .badge{
  position:absolute; top:0; left:calc(50% - 2px); background:var(--danger); color:#fff; font-size:10px;
  min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 4px;
}

/* =====[ SECTION: LISTS (طلاب/معلمات/مفاتيح) ]===== */
.list-item{
  display:flex; align-items:center; gap:12px; padding:13px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-md); margin-bottom:10px; position:relative; transition:transform .15s ease;
}
.list-item:active{transform:scale(.98);}
.avatar{
  width:48px; height:48px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:17px; color:#fff; background:linear-gradient(155deg,var(--emerald-600),var(--emerald-900));
  position:relative;
}
.avatar .dot{position:absolute; bottom:1px; left:1px; width:12px; height:12px; border-radius:50%; border:2px solid var(--surface); background:var(--text-dim);}
.avatar .dot.online{background:var(--success);}
.li-body{flex:1; min-width:0;}
.li-body b{display:block; font-size:15px; margin-bottom:2px;}
.li-body span{display:block; font-size:12.5px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.li-meta{display:flex; flex-direction:column; align-items:flex-end; gap:6px; font-size:11px; color:var(--text-dim);}

.progress-track{height:8px; border-radius:6px; background:var(--surface-2); overflow:hidden; margin-top:6px;}
.progress-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--gold-500),var(--gold-400)); transition:width .6s ease;}

/* =====[ SECTION: CHAT (شبيه واتساب) ]===== */
.chat-screen{display:flex; flex-direction:column; height:100vh;}
.chat-header{
  display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); z-index:20;
}
.chat-header .li-body span{color:var(--success); font-weight:600;}
.chat-actions{display:flex; gap:8px;}
.chat-body{
  flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:6px;
  background-image: radial-gradient(circle at 10px 10px, var(--border) 1px, transparent 1.4px);
  background-size:26px 26px; background-color:var(--bg);
}
.bubble{max-width:78%; padding:10px 14px; border-radius:16px; font-size:14.5px; line-height:1.6; position:relative; animation:popIn .25s ease;}
@keyframes popIn{from{opacity:0; transform:scale(.9);} to{opacity:1; transform:scale(1);}}
.bubble.me{align-self:flex-start; background:var(--accent); color:var(--surface); border-bottom-left-radius:4px;}
[data-theme="dark"] .bubble.me{color:var(--emerald-950);}
.bubble.them{align-self:flex-end; background:var(--surface); border:1px solid var(--border); border-bottom-right-radius:4px;}
.bubble .meta{display:flex; gap:5px; align-items:center; justify-content:flex-end; font-size:10px; opacity:.7; margin-top:4px;}
.bubble.system{align-self:center; background:var(--surface-2); color:var(--text-dim); font-size:12px; border-radius:10px; padding:6px 12px;}
.chat-input-bar{display:flex; gap:8px; padding:10px 14px calc(10px + env(safe-area-inset-bottom)); background:var(--surface); border-top:1px solid var(--border); align-items:flex-end;}
.chat-input-bar textarea{flex:1; max-height:110px; border-radius:20px; padding:11px 16px;}
.send-btn{width:44px; height:44px; border-radius:50%; background:var(--accent); color:var(--surface); border:none; flex-shrink:0; font-size:17px;}
[data-theme="dark"] .send-btn{color:var(--emerald-950);}
.attach-btn{width:44px; height:44px; border-radius:50%; background:var(--surface-2); color:var(--text); border:none; flex-shrink:0; font-size:19px;}
.attach-btn:active{transform:scale(.92);}

/* =====[ SECTION: CHAT MEDIA (صور/ملفات) ]===== */
.bubble.media{padding:6px; overflow:hidden;}
.bubble .chat-img{display:block; max-width:220px; max-height:280px; width:100%; border-radius:12px; object-fit:cover; cursor:pointer;}
.bubble .chat-img-wrap{position:relative;}
.bubble .chat-img-wrap .meta{position:absolute; bottom:6px; left:8px; background:rgba(0,0,0,.45); color:#fff; padding:2px 8px; border-radius:8px;}
.bubble.file-bubble{display:flex; align-items:center; gap:10px; min-width:190px;}
.bubble.file-bubble .file-ic{width:40px; height:40px; border-radius:10px; background:rgba(0,0,0,.08); display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0;}
.bubble.file-bubble .file-info{flex:1; min-width:0;}
.bubble.file-bubble .file-info b{display:block; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:150px;}
.bubble.file-bubble .file-info span{font-size:11px; opacity:.75;}
.bubble.file-bubble a.file-dl{color:inherit; font-size:18px;}
.upload-progress-wrap{padding:8px 12px 4px;}
.upload-progress-bar{height:4px; border-radius:4px; background:var(--surface-2); overflow:hidden;}
.upload-progress-fill{height:100%; background:var(--accent); transition:width .2s ease;}
.img-viewer{position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:400; display:none; align-items:center; justify-content:center; padding:20px;}
.img-viewer.active{display:flex;}
.img-viewer img{max-width:100%; max-height:100%; border-radius:8px;}
.img-viewer .close-viewer{position:absolute; top:18px; left:18px; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.15); color:#fff; border:none; font-size:18px;}

/* =====[ SECTION: CALL UI ]===== */
.call-overlay{
  position:fixed; inset:0; z-index:300; background:linear-gradient(180deg,var(--emerald-950),var(--emerald-900));
  display:none; flex-direction:column; align-items:center; justify-content:space-between; color:#f2ead2; padding:40px 24px calc(40px + env(safe-area-inset-bottom));
  text-align:center;
}
.call-overlay.active{display:flex;}
.call-overlay .avatar{width:110px; height:110px; font-size:38px; margin:auto 0 12px;}
.call-status{font-size:14px; opacity:.75; letter-spacing:.5px;}
.call-name{font-size:24px; font-family:var(--font-display);}
.call-timer{font-size:15px; opacity:.85; direction:ltr;}
.pulse-ring{position:relative;}
.pulse-ring:before{content:""; position:absolute; inset:-14px; border-radius:50%; border:2px solid var(--gold-400); animation:pulse 1.8s ease-out infinite;}
@keyframes pulse{0%{opacity:.8; transform:scale(.85);} 100%{opacity:0; transform:scale(1.35);}}
.call-actions{display:flex; gap:26px; align-items:center;}
.call-btn{
  width:64px; height:64px; border-radius:50%; border:none; font-size:24px; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.12); color:#fff;
}
.call-btn.reject, .call-btn.end{background:var(--danger); width:70px; height:70px; font-size:27px;}
.call-btn.accept{background:var(--success); width:70px; height:70px; font-size:27px;}
.call-btn.mute.active{background:var(--gold-500); color:var(--emerald-950);}

/* =====[ SECTION: INCOMING CALL BANNER ]===== */
.incoming-banner{
  position:fixed; top:14px; right:14px; left:14px; z-index:250; background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:14px; display:none; align-items:center; gap:12px; box-shadow:var(--shadow); animation:dropIn .4s ease;
}
.incoming-banner.active{display:flex;}
@keyframes dropIn{from{transform:translateY(-40px); opacity:0;} to{transform:translateY(0); opacity:1;}}

/* =====[ SECTION: MODAL ]===== */
.modal-bg{position:fixed; inset:0; background:rgba(7,35,26,0.55); z-index:150; display:none; align-items:flex-end; justify-content:center;}
.modal-bg.active{display:flex;}
.modal-sheet{
  background:var(--surface); width:100%; max-width:520px; border-radius:24px 24px 0 0; padding:22px 20px calc(22px + env(safe-area-inset-bottom));
  animation:sheetUp .35s cubic-bezier(.2,.8,.2,1); max-height:85vh; overflow-y:auto;
}
@keyframes sheetUp{from{transform:translateY(60px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-sheet h3{margin:0 0 16px;}
.sheet-handle{width:40px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 16px;}

/* =====[ SECTION: STARS ]===== */
.stars{display:flex; gap:8px; justify-content:center; font-size:34px; direction:ltr; margin:14px 0;}
.stars span{color:var(--border); cursor:pointer; transition:transform .15s ease;}
.stars span.filled{color:var(--gold-500); transform:scale(1.1);}

/* =====[ SECTION: STATS GRID ]===== */
.stats-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;}
.stat-box{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:16px; text-align:center;}
.stat-box b{font-size:26px; display:block; color:var(--accent); font-family:var(--font-display);}
.stat-box span{font-size:12px; color:var(--text-dim);}

.section-title{font-size:14px; font-weight:800; color:var(--text-dim); margin:22px 0 12px; display:flex; align-items:center; justify-content:space-between;}

.empty-state{text-align:center; padding:50px 20px; color:var(--text-dim);}
.empty-state .emoji{font-size:44px; margin-bottom:10px; display:block;}

.badge-item{display:flex; align-items:center; gap:10px; background:var(--surface-2); padding:10px 12px; border-radius:12px; margin-bottom:8px;}
.badge-item .ic{font-size:20px;}

.segmented{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px;}
.segmented button{white-space:nowrap; padding:9px 16px; border-radius:12px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-weight:700; font-size:13px;}
.segmented button.active{background:var(--accent); color:var(--surface); border-color:var(--accent);}
[data-theme="dark"] .segmented button.active{color:var(--emerald-950);}

.key-code{font-family:monospace; direction:ltr; font-size:15px; font-weight:700; letter-spacing:1px; background:var(--surface-2); padding:4px 10px; border-radius:8px;}

<script>
/* =====[ SECTION: CONFIG — عدّل هنا فقط ]===== */
const FIREBASE_CONFIG = {

  authDomain: "adminscriptstarko.firebaseapp.com", // تأكد منها في Firebase Console

  messagingSenderId: "310036534754", // تأكد منها في Firebase Console
  appId: "1:310036534754:android:ba27e270c322f0164e15bb"

const AGORA_APP_ID = "0d60209ff93e4aa196f1ba79151ab296";
// ملحوظة: الوضع دلوقتي "App ID فقط" (بدون Token) — لازم يتلغى الـ App Certificate من Agora Console
// من: https://console.agora.io -> مشروعك -> Authentication -> اختار "App ID" بس (مش "App ID + Token")

/* =====[ SECTION: INIT ]===== */
firebase.initializeApp(FIREBASE_CONFIG);

let state = {

/* =====[ SECTION: UTILITIES ]===== */
function $(sel,root=document){return root.querySelector(sel);}
function $all(sel,root=document){return [...root.querySelectorAll(sel)];}
function esc(str){ if(str==null) return ''; return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, ms=2600){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), ms);
}
function initials(name){ if(!name) return '؟'; return name.trim().split(' ').slice(0,2).map(w=>w[0]).join(''); }
function fmtTime(ts){ if(!ts) return ''; const d=new Date(ts); return d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(ts){ if(!ts) return ''; const d=new Date(ts); return d.toLocaleDateString('ar-EG',{day:'numeric',month:'short'}); }
function fmtDuration(sec){ const m=Math.floor(sec/60).toString().padStart(2,'0'); const s=(sec%60).toString().padStart(2,'0'); return `${m}:${s}`; }
function pairId(a,b){ return [a,b].sort().join('_'); }
// مولّد كود اشتراك من 8 خانات (استبعدت الحروف/الأرقام المتشابهة بصريًا زي 0/O و1/I)
function uid8(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for(let i=0;i<8;i++){ s += chars[Math.floor(Math.random()*chars.length)]; }
  return s;
}
function getDeviceId(){
  let id = localStorage.getItem('rw_device_id');
  if(!id){ id = 'dev_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,10); localStorage.setItem('rw_device_id', id); }
  return id;
}
function showModal(html){ $('#modalSheet').innerHTML = `<div class="sheet-handle"></div>${html}`; $('#modalBg').classList.add('active'); }
function hideModal(){ $('#modalBg').classList.remove('active'); }
document.addEventListener('DOMContentLoaded', ()=>{
  $('#modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') hideModal(); });
  $('#imgViewer').addEventListener('click', e=>{ if(e.target.id==='imgViewer'||e.target.id==='btnCloseViewer') closeImgViewer(); });
});
function openImgViewer(url){ $('#imgViewerImg').src = url; $('#imgViewer').classList.add('active'); }
function closeImgViewer(){ $('#imgViewer').classList.remove('active'); $('#imgViewerImg').src=''; }
function fmtBytes(n){
  if(!n) return '0 KB';
  if(n < 1024*1024) return Math.max(1, Math.round(n/1024)) + ' KB';
  return (n/(1024*1024)).toFixed(1) + ' MB';
}

function tasbihBar(percent){
  percent = Math.max(0, Math.min(100, percent||0));
  const total = 12; const filled = Math.round((percent/100)*total);
  let html = '<div class="tasbih">';
  for(let i=0;i<total;i++){ html += `<div class="bead ${i<filled?'filled':''}"></div>`; }
  html += '</div>';
  return html;
}

function setTheme(mode){
  state.theme = mode; document.documentElement.setAttribute('data-theme', mode);
  localStorage.setItem('rw_theme', mode);
}
(function initTheme(){
  const saved = localStorage.getItem('rw_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark':'light');
  setTheme(saved);
})();

/* =====[ SECTION: SECURITY ALERT LOGGER ]===== */
function logSecurityAlert(type, detail){
  try{
    db.ref('security_alerts').push({
      type, detail: String(detail), uid: state.user? state.user.uid : null, deviceId: getDeviceId(), ts: firebase.database.ServerValue.TIMESTAMP
    });
  }catch(e){}
}

/* =====[ SECTION: RENDER ROOT ]===== */
function render(){
  const app = $('#app');
  if(state.route==='loading'){ app.innerHTML = `<div class="loader-wrap"><div class="loader-ring"></div><div style="font-family:var(--font-display);color:var(--accent);font-size:18px">رواسخ أكاديمية</div></div>`; return; }
  if(state.route==='auth'){ app.innerHTML = screenAuth(); bindAuthEvents(); return; }
  if(state.route==='pending'){ app.innerHTML = screenPending(); bindPendingEvents(); return; }
  if(state.route==='banned'){ app.innerHTML = screenBanned(); bindBannedEvents(); return; }
  if(state.route==='expired'){ app.innerHTML = screenExpired(); bindExpiredEvents(); return; }

  if(state.chatWith){ app.innerHTML = screenChat(); bindChatEvents(); return; }

  if(state.profile && state.profile.role==='admin'){ app.innerHTML = screenAdminShell(); bindAdminEvents(); return; }
  if(state.profile && state.profile.role==='teacher'){ app.innerHTML = screenTeacherShell(); bindTeacherEvents(); return; }
  if(state.profile && state.profile.role==='student'){ app.innerHTML = screenStudentShell(); bindStudentEvents(); return; }
}

/* =====[ SECTION: AUTH SCREENS ]===== */
let authTab = 'login';
let regRole = null;
function screenAuth(){

function tplLoginForm(){
  return `
    <div class="field"><label>اسم المستخدم</label><input id="loginUsername" placeholder="مثال: ahmed_2026" autocomplete="username"></div>
    <div class="field"><label>كلمة المرور</label><input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn" id="btnLogin">دخول</button>
    <div class="divider-orn">بيانات الدخول محفوظة على جهازك</div>`;
}
function tplRegisterForm(){
  return `
    <div class="section-title">اختر دورك</div>
    <div class="role-pick">
      <div class="role-card ${regRole==='teacher'?'selected':''}" data-role="teacher"><div class="emoji">📖</div><b>معلمة</b><span>تعليم ومتابعة</span></div>
      <div class="role-card ${regRole==='student'?'selected':''}" data-role="student"><div class="emoji">🌙</div><b>طالب/ة</b><span>حفظ ومراجعة</span></div>
    </div>
    <div class="field"><label>الاسم بالكامل</label><input id="regName" placeholder="اكتب اسمك"></div>
    <div class="field"><label>اسم المستخدم</label><input id="regUsername" placeholder="بالإنجليزية بدون مسافات" autocomplete="username"></div>
    <div class="field"><label>كلمة المرور</label><input id="regPassword" type="password" placeholder="8 أحرف على الأقل" autocomplete="new-password"></div>

}
function bindAuthEvents(){
  $all('[data-tab]').forEach(b=>b.addEventListener('click', ()=>{ authTab=b.dataset.tab; render(); }));
  if(authTab==='login'){
    $('#btnLogin')?.addEventListener('click', doLogin);
  } else {
    $all('.role-card').forEach(c=>c.addEventListener('click', ()=>{ regRole=c.dataset.role; render(); }));
    $('#btnRegister')?.addEventListener('click', doRegister);
  }
}
function usernameToEmail(u){ return u.trim().toLowerCase().replace(/[^a-z0-9_.]/g,'') + '@rawasekh.app'; }

async function doLogin(){
  const uname = $('#loginUsername').value.trim();
  const pass = $('#loginPassword').value;
  if(!uname || !pass){ toast('من فضلك أدخل اسم المستخدم وكلمة المرور'); return; }
  const btn = $('#btnLogin'); btn.disabled = true; btn.textContent='جارِ الدخول...';
  try{
    await auth.signInWithEmailAndPassword(usernameToEmail(uname), pass);
  }catch(e){
    logSecurityAlert('login_failed', uname);
    toast('بيانات الدخول غير صحيحة');
  } finally { if(btn){btn.disabled=false; btn.textContent='دخول';} }
}
async function doRegister(){
  const name = $('#regName').value.trim();
  const uname = $('#regUsername').value.trim();
  const pass = $('#regPassword').value;
  if(!regRole){ toast('اختر دورك أولاً'); return; }
  if(!name || !uname || pass.length<8){ toast('أكمل البيانات (كلمة المرور 8 أحرف على الأقل)'); return; }
  const cleanUname = uname.toLowerCase().replace(/[^a-z0-9_.]/g,'');
  if(cleanUname.length<3){ toast('اسم مستخدم غير صالح'); return; }
  const btn = $('#btnRegister'); btn.disabled=true; btn.textContent='جارِ الإنشاء...';
  let cred = null, claimed = false;
  try{
    // فحص سريع (قراءة عامة مسموحة للكل حتى بدون تسجيل دخول) عشان منعملش حساب Auth
    // من غير داعي لو الاسم مأخوذ أصلاً
    const preSnap = await db.ref('usernames/'+cleanUname).get();
    if(preSnap.exists()){ toast('اسم المستخدم مستخدم بالفعل'); return; }

    // لازم ننشئ حساب الـ Auth الأول، لأن رول الفايربيس بتشترط auth != null
    // على أي كتابة تحت usernames/ — الحجز مينفعش يحصل قبل تسجيل الدخول
    cred = await auth.createUserWithEmailAndPassword(usernameToEmail(cleanUname), pass);
    const newUid = cred.user.uid;

    // حجز اسم المستخدم بشكل ذرّي (transaction) بدل قراءة-ثم-كتابة، عشان نمنع
    // احتمال (نادر لكن حقيقي) إن اتنين يسجلوا بنفس اليوزرنيم في نفس اللحظة بالظبط.
    // القيمة المكتوبة لازم تبقى uid الحقيقي (مش placeholder) عشان تتطابق مع الرول.
    const txResult = await db.ref('usernames/'+cleanUname).transaction(cur => cur===null ? newUid : undefined);
    if(!txResult.committed){
      toast('اسم المستخدم مستخدم بالفعل');
      try{ await cred.user.delete(); }catch(_){}
      return;
    }
    claimed = true;

    await db.ref('users/'+newUid).set({
      name, username:cleanUname, role:regRole, status:'pending', createdAt: firebase.database.ServerValue.TIMESTAMP
    });
    toast('تم إنشاء الحساب، بانتظار تفعيل الأدمن');
  }catch(e){
    if(claimed){ try{ await db.ref('usernames/'+cleanUname).remove(); }catch(_){} }
    if(cred && cred.user){ try{ await cred.user.delete(); }catch(_){} }
    toast('حدث خطأ: ' + (e.message||'حاول مرة أخرى'));
  } finally { if(btn){btn.disabled=false; btn.textContent='إنشاء الحساب';} }
}

function bindPendingEvents(){
  $('#btnRedeem')?.addEventListener('click', redeemCode);
  $('#btnLogoutPending')?.addEventListener('click', ()=>auth.signOut());
}
async function redeemCode(){
  const code = $('#redeemCode').value.trim().toUpperCase();
  if(!code){ toast('اكتب الكود'); return; }
  const btn = $('#btnRedeem'); btn.disabled=true; btn.textContent='جارِ التفعيل...';
  const dId = getDeviceId();
  const myUid = state.user.uid;
  const myRole = state.profile.role;
  try{
    // عيب #7 (مُصلَح): كانت العملية عبارة عن "قراءة ثم كتابة" عادية (get ثم update)،
    // يعني لو شخصين ضربوا نفس الكود في نفس اللحظة بالضبط، الاتنين ممكن يعدّوا فحص
    // "الكود متاح" قبل ما أي واحد يكتب، والكود يُستخدم مرتين. دلوقتي بنستخدم
    // transaction ذرّية زي حجز اسم المستخدم بالظبط: فايربيس بيضمن إن التعديل
    // يحصل مرة واحدة بس على أحدث نسخة من البيانات، وأي محاولة تانية في نفس
    // اللحظة هتتلغى (تترجع undefined) تلقائيًا.
    const txResult = await db.ref('codes/'+code).transaction(cur=>{
      if(cur===null) return; // الكود غير موجود أصلاً — نلغي المعاملة
      if(cur.status!=='active' || cur.deviceId) return; // مستخدم أو غير صالح — نلغي المعاملة
      if(cur.type !== myRole) return; // نوع غير مطابق لدور المستخدم — نلغي المعاملة
      return {
        ...cur,
        deviceId: dId,
        assignedUid: myUid,
        deviceInfo: (navigator.userAgent||'').slice(0,150),
        redeemedAt: firebase.database.ServerValue.TIMESTAMP
      };
    });

    if(!txResult.committed){
      // المعاملة اتلغت، نجيب سبب واضح للمستخدم برسالة منفصلة (قراءة بسيطة، بدون كتابة)
      const snap = await db.ref('codes/'+code).get();
      if(!snap.exists()){ toast('الكود غير موجود'); }
      else if(snap.val().type !== myRole){ toast('هذا الكود غير مخصص لدورك'); }
      else { toast('الكود مستخدم أو غير صالح'); logSecurityAlert('code_reuse_attempt', code); }
      return;
    }

    const finalCodeData = txResult.snapshot.val();
    // تأكيد إضافي إننا فعلاً احنا اللي فزنا بالمعاملة (وليس مستخدم آخر كتب بيانات
    // مطابقة بالتوقيت نفسه بشكل نادر جدًا)
    if(!finalCodeData || finalCodeData.assignedUid !== myUid){
      toast('الكود مستخدم أو غير صالح'); logSecurityAlert('code_reuse_attempt', code); return;
    }

    const isTrial = finalCodeData.plan==='trial';
    const subUpdate = isTrial
      ? { codeId: code, type: 'trial', status:'trial', expiresAt: Date.now() + 3*24*60*60*1000 }
      : { codeId: code, type: finalCodeData.plan||finalCodeData.type, status:'active', expiresAt: finalCodeData.expiresAt||null };
    await db.ref('users/'+myUid+'/subscription').set(subUpdate);
    await db.ref('users/'+myUid+'/status').set('active');
    toast('تم تفعيل حسابك بنجاح 🎉');
  }catch(e){
    toast('تعذر التفعيل: ' + (e.message||''));
  } finally { if(btn){btn.disabled=false; btn.textContent='تفعيل الحساب';} }
}

/* =====[ SECTION: AUTH STATE / ROUTING ]===== */
let profileRef = null;

// عيب #1-4 (مُصلَح): كل المتغيرات الـ Global دي كانت بتفضل عالقة بعد تسجيل
// الخروج، فلو حساب تاني سجّل دخول في نفس المتصفح كان ممكن يشوف بيانات
// الحساب اللي قبله (شات، طالب/ة نشطة، معلم مخصص، تاب مفتوح...). الدالة دي
// بترجع كل حاجة لوضعها الافتراضي في كل مرة يتم فيها تسجيل خروج.
function resetLocalState(){
  state.chatWith = null;
  state.currentChatWith = null;
  state.currentCallId = null;
  if(state.callTimerInt){ clearInterval(state.callTimerInt); }
  state.callTimerInt = null;
  state.callSeconds = 0;
  state.agoraClient = null;
  state.localAudioTrack = null;
  state.studentsCache = {};
  state.teachersCache = {};
  state.routeParams = {};
  // مهم: تصفير presenceRef برضو، عشان setupPresence() تقدر تسجّل الحضور
  // للحساب الجديد اللي هيدخل بعد كده في نفس الـ tab (كانت هي دي القيمة
  // اللي بتخلي setupPresence تعمل return بدري وتتجاهل الحساب الجديد).
  state.presenceRef = null;
  myTeacherCache = null;
  teacherActiveStudent = null;
  adminView = 'dashboard';
  teacherView = 'students';
  studentView = 'home';
  authTab = 'login';
  regRole = null;
  usersFilter = 'all';
  usersState = { search:'', sort:'newest', page:1 };
  stopTrialWatch();
}

// عيب #9 (مُصلَح): مفيش أي كود كان بيتحقق من expiresAt للاشتراك التجريبي،
// يعني حساب "تجربة 3 أيام" كان فعليًا مش بينتهي أبدًا. الدالة دي بتفحص
// وقت انتهاء التجربة وترجع true/false.
function isTrialExpired(p){
  return !!(p && p.subscription && p.subscription.status==='trial' && p.subscription.expiresAt && Date.now() > p.subscription.expiresAt);
}
async function expireTrialIfNeeded(uid, p){
  if(isTrialExpired(p) && p.status!=='expired'){
    try{
      await db.ref('users/'+uid).update({status:'expired', 'subscription/status':'expired'});
    }catch(e){ /* لو فشل التحديث هيتحاول تاني في المرة الجاية */ }
  }
}
// فحص دوري كل دقيقة وهو التطبيق مفتوح، عشان التجربة تنتهي فورًا فور
// انتهاء المدة الزمنية حتى لو مفيش تعديل جديد في قاعدة البيانات يستدعي
// المستمع (onAuthStateChanged/profileRef بيتفعّلوا فقط عند تغيّر الداتا،
// مش عند مرور الوقت).
let trialCheckInterval = null;
function startTrialWatch(){
  stopTrialWatch();
  trialCheckInterval = setInterval(()=>{
    if(state.user && state.profile) expireTrialIfNeeded(state.user.uid, state.profile);
  }, 60000);
}
function stopTrialWatch(){ if(trialCheckInterval){ clearInterval(trialCheckInterval); trialCheckInterval=null; } }

function routeFromProfile(uid, p, isAdminNode){
  if(isAdminNode){ return 'ready'; }
  if(!p) return 'auth';
  if(p.role==='admin') return 'ready';
  if(p.status==='banned') return 'banned';
  if(isTrialExpired(p)){ expireTrialIfNeeded(uid, p); return 'expired'; }
  if(p.status==='expired') return 'expired';
  if(p.status!=='active') return 'pending';
  return 'ready';
}

auth.onAuthStateChanged(user=>{
  if(profileRef){ profileRef.off(); profileRef=null; }
  teardownChat(); teardownCallListener(); teardownCallPeerWatch();
  if(!user){ state.user=null; state.profile=null; state.route='auth'; resetLocalState(); render(); return; }
  state.user = user;
  state.sessionStartedAt = Date.now(); // يُستخدم للتحقق من أوامر "إجبار تسجيل الخروج" الصادرة من الأدمن بعد هذه اللحظة
  // فحص إضافي: عقدة admins/{uid}:true منفصلة عن users/ — بعض المشاريع بتستخدمها بدل role:"admin"
  db.ref('admins/'+user.uid).get().then(adminSnap=>{
    const isAdminNode = adminSnap.exists() && adminSnap.val()===true;
    profileRef = db.ref('users/'+user.uid);
    profileRef.on('value', snap=>{
      const p = snap.val();
      if(p && p.forceLogoutAt && p.forceLogoutAt > state.sessionStartedAt){ auth.signOut(); return; }
      state.profile = isAdminNode ? {...(p||{}), role:'admin'} : p;
      state.route = routeFromProfile(user.uid, state.profile, isAdminNode);
      if(state.route==='ready'){ setupPresence(); startTrialWatch(); if(!isAdminNode && p && p.role!=='admin') listenIncomingCalls(); }
      render();
    });
  }).catch(()=>{
    // لو مفيش صلاحية قراءة admins/ أصلاً، كمّل بالمسار العادي
    profileRef = db.ref('users/'+user.uid);
    profileRef.on('value', snap=>{
      const p = snap.val();
      if(p && p.forceLogoutAt && p.forceLogoutAt > state.sessionStartedAt){ auth.signOut(); return; }
      state.profile = p;
      state.route = routeFromProfile(user.uid, p, false);
      if(state.route==='ready'){ setupPresence(); startTrialWatch(); if(p && p.role!=='admin') listenIncomingCalls(); }
      render();
    });
  });
});
function setupPresence(){
  if(state.presenceRef) return;
  const r = db.ref('presence/'+state.user.uid);
  state.presenceRef = r;
  r.onDisconnect().set({online:false, lastSeen: firebase.database.ServerValue.TIMESTAMP});
  r.set({online:true, lastSeen: firebase.database.ServerValue.TIMESTAMP});
}
function logout(){ auth.signOut(); }

async function loadAdminStats(){

  $('#statsArea').innerHTML = `

  // أحدث التسجيلات
  const recent = [...userEntries].sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)).slice(0,5);
  $('#recentRegs').innerHTML = recent.length ? recent.map(([id,u])=>`
    <div class="list-item"><div class="avatar">${initials(u.name)}</div>
      <div class="li-body"><b>${esc(u.name)}</b><span>@${esc(u.username)} · ${u.role==='teacher'?'معلمة':u.role==='admin'?'أدمن':'طالب'}</span></div>

  // أكثر الطلاب نشاطاً (حسب نسبة الإنجاز كمؤشر تقدّم/نشاط)

    .map(([id,u])=>({id,u,pct:(progress[id]&&progress[id].totalPercent)||0}))
    .sort((a,b)=>b.pct-a.pct).slice(0,5);
  $('#topStudents').innerHTML = topStu.length ? topStu.map(({id,u,pct})=>`
    <div class="list-item"><div class="avatar">${initials(u.name)}</div>

        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

    </div>`).join('') : '<div class="empty-state">لا يوجد طلاب بعد</div>';

  // أكثر المعلمات نشاطاً (حسب عدد الطلاب المخصصين كمؤشر حِمل العمل)
  const topTea = userEntries.filter(([,u])=>u.role==='teacher')
    .map(([id,u])=>({id,u,count:Object.keys(assignments[id]||{}).length}))

  $('#topTeachers').innerHTML = topTea.length ? topTea.map(({id,u,count})=>`

  // صحة الاشتراكات: منتهية + قريبة الانتهاء (خلال 3 أيام)، بالاعتماد على subscription.expiresAt
  const soonMs = 3*24*60*60*1000;

  const expiredList = userEntries.filter(([,u])=>u.status==='expired');
  const expiringSoon = userEntries.filter(([,u])=>{

      </div>`).join('') : ''}`;

  const alerts = alertsSnap.val()||{};
  const arr = Object.entries(alerts).reverse();
  $('#alertsPreview').innerHTML = arr.length ? arr.map(([id,a])=>`
    <div class="list-item"><div class="li-body"><b>${esc(a.type)}</b><span>${esc(a.detail||'')} · ${fmtDate(a.ts)} ${fmtTime(a.ts)}</span></div></div>`).join('') : '<div class="empty-state">لا توجد تنبيهات</div>';
  }catch(e){ showLoadError('statsArea', e); showLoadError('alertsPreview', e); }

function filterSortKeys(codes){
  let entries = Object.entries(codes);
  const s = keysState.search.trim().toLowerCase();
  if(s) entries = entries.filter(([id,c])=> id.toLowerCase().includes(s) || (c.ownerName||'').toLowerCase().includes(s));
  if(keysState.type!=='all') entries = entries.filter(([,c])=>c.type===keysState.type);
  if(keysState.status==='active') entries = entries.filter(([,c])=>c.status==='active');
  else if(keysState.status==='disabled') entries = entries.filter(([,c])=>c.status==='disabled');
  else if(keysState.status==='expired') entries = entries.filter(([,c])=>c.status==='expired');
  else if(keysState.status==='used') entries = entries.filter(([,c])=>!!c.deviceId);
  else if(keysState.status==='unused') entries = entries.filter(([,c])=>!c.deviceId);
  if(keysState.sort==='oldest') entries.sort((a,b)=>(a[1].createdAt||0)-(b[1].createdAt||0));
  else if(keysState.sort==='expiry') entries.sort((a,b)=>(a[1].expiresAt||Infinity)-(b[1].expiresAt||Infinity));
  else entries.sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
  return entries;
}

  bindKeysListEvents();

let _keysSearchDebounce = null;
function bindKeysToolbarEvents(){
  $('#keysSearch').value = keysState.search;

  $('#keysSort').value = keysState.sort;
  $('#keysSearch').addEventListener('input', e=>{
    clearTimeout(_keysSearchDebounce);

  });
  $('#keysFilterStatus').addEventListener('change', e=>{ keysState.status = e.target.value; keysState.page=1; renderKeysList(); });
  $('#keysFilterType').addEventListener('change', e=>{ keysState.type = e.target.value; keysState.page=1; renderKeysList(); });
  $('#keysSort').addEventListener('change', e=>{ keysState.sort = e.target.value; keysState.page=1; renderKeysList(); });

    deleteKeysPermanently(ids);
  });
  $('#btnExportKeysCSV').addEventListener('click', ()=>exportKeysCSV(filterSortKeys(_keysCache)));
}

function exportKeysCSV(entries){
  if(!entries.length){ toast('لا توجد بيانات للتصدير'); return; }
  const header = ['code','type','plan','ownerName','status','used','deviceInfo','createdAt','expiresAt'];
  const rows = entries.map(([id,c])=>[
    id, c.type||'', c.plan||'', (c.ownerName||'').replace(/,/g,' '), c.status||'',
    c.deviceId?'yes':'no', (c.deviceInfo||'').replace(/,/g,' '),
    c.createdAt?new Date(c.createdAt).toISOString():'', c.expiresAt?new Date(c.expiresAt).toISOString():''
  ]);
  const csv = [header, ...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'rawasekh-keys-'+Date.now()+'.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
  toast('جارِ تنزيل الملف');
}

let usersFilter='all';
let usersState = { search:'', sort:'newest', page:1 };
const USERS_PAGE_SIZE = 12;
let _usersCache = {};
async function loadAdminUsers(){
  try{
  const snap = await db.ref('users').get();
  _usersCache = snap.val()||{};
  renderUsersList(_usersCache);
  $all('.segmented [data-f]').forEach(b=>b.addEventListener('click', ()=>{
    usersFilter=b.dataset.f; usersState.page=1; $all('.segmented [data-f]').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    renderUsersList(_usersCache);
  }));
  $('#usersSearch').value = usersState.search;
  $('#usersSort').value = usersState.sort;
  let searchDebounce = null;
  $('#usersSearch').addEventListener('input', e=>{
    clearTimeout(searchDebounce);
    const val = e.target.value;
    searchDebounce = setTimeout(()=>{ usersState.search=val; usersState.page=1; renderUsersList(_usersCache); }, 300);
  });
  $('#usersSort').addEventListener('change', e=>{ usersState.sort=e.target.value; usersState.page=1; renderUsersList(_usersCache); });
  }catch(e){ showLoadError('usersList', e); }
}
function renderUsersList(users){
  let entries = Object.entries(users);
  if(usersFilter==='teacher') entries = entries.filter(([,u])=>u.role==='teacher');
  else if(usersFilter==='student') entries = entries.filter(([,u])=>u.role==='student');
  else if(usersFilter==='pending') entries = entries.filter(([,u])=>u.status==='pending');
  else if(usersFilter==='banned') entries = entries.filter(([,u])=>u.status==='banned');
  const s = usersState.search.trim().toLowerCase();
  if(s) entries = entries.filter(([,u])=>(u.name||'').toLowerCase().includes(s) || (u.username||'').toLowerCase().includes(s));
  if(usersState.sort==='oldest') entries.sort((a,b)=>(a[1].createdAt||0)-(b[1].createdAt||0));
  else if(usersState.sort==='name') entries.sort((a,b)=>(a[1].name||'').localeCompare(b[1].name||'', 'ar'));
  else entries.sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));

  const totalPages = Math.max(1, Math.ceil(entries.length/USERS_PAGE_SIZE));
  if(usersState.page>totalPages) usersState.page = totalPages;
  const pageEntries = entries.slice((usersState.page-1)*USERS_PAGE_SIZE, usersState.page*USERS_PAGE_SIZE);

  $('#usersList').innerHTML = pageEntries.length ? pageEntries.map(([id,u])=>`
    <div class="list-item">
      <div class="avatar">${initials(u.name)}</div>
      <div class="li-body"><b>${esc(u.name)}</b><span>@${esc(u.username)} · ${u.role==='teacher'?'معلمة':u.role==='admin'?'أدمن':'طالب'}</span></div>
      <div class="li-meta">
        <span class="chip ${u.status==='active'?'ok':u.status==='banned'?'danger':'warn'}">${u.status==='active'?'مفعّل':u.status==='banned'?'موقوف':'قيد المراجعة'}</span>
        ${u.role!=='admin' ? `<button class="btn sm ${u.status==='banned'?'ghost':'danger'}" data-toggleban="${id}" data-cur="${u.status}">${u.status==='banned'?'رفع الإيقاف':'إيقاف'}</button>` : ''}
      </div>
    </div>
    ${u.role!=='admin' ? `
    <div class="key-actions-row" style="margin-bottom:10px">
      <button class="btn sm ghost" data-changerole="${id}">${u.role==='teacher'?'تحويل لطالب':'تحويل لمعلمة'}</button>
      ${u.role==='student' ? `<button class="btn sm ghost" data-reassign="${id}">نقل لمعلمة أخرى</button>` : ''}
      <button class="btn sm ghost" data-resetpass="${id}">إعادة تعيين كلمة المرور</button>
      <button class="btn sm ghost" data-forcelogout="${id}">إجبار الخروج</button>
      <button class="btn sm danger" data-deleteuser="${id}">حذف نهائي</button>
    </div>` : ''}`).join('') : '<div class="empty-state">لا يوجد مستخدمين</div>';

  $('#usersPagination').innerHTML = entries.length ? `
    <button class="btn sm ghost" id="btnUsersPrev" ${usersState.page<=1?'disabled':''}>السابق</button>
    <span>صفحة ${usersState.page} من ${totalPages}</span>
    <button class="btn sm ghost" id="btnUsersNext" ${usersState.page>=totalPages?'disabled':''}>التالي</button>` : '';
  $('#btnUsersPrev')?.addEventListener('click', ()=>{ usersState.page--; renderUsersList(users); });
  $('#btnUsersNext')?.addEventListener('click', ()=>{ usersState.page++; renderUsersList(users); });

  $all('[data-toggleban]').forEach(b=>b.addEventListener('click', async ()=>{
    const newStatus = b.dataset.cur==='banned' ? 'active' : 'banned';
    await db.ref('users/'+b.dataset.toggleban+'/status').set(newStatus);
    toast(newStatus==='banned'?'تم إيقاف الحساب':'تم تفعيل الحساب');
    loadAdminUsers();
  }));
  $all('[data-changerole]').forEach(b=>b.addEventListener('click', ()=>changeUserRole(b.dataset.changerole, users[b.dataset.changerole])));
  $all('[data-reassign]').forEach(b=>b.addEventListener('click', ()=>openReassignTeacherModal(b.dataset.reassign, users[b.dataset.reassign])));
  $all('[data-resetpass]').forEach(b=>b.addEventListener('click', ()=>resetUserPassword(users[b.dataset.resetpass])));
  $all('[data-forcelogout]').forEach(b=>b.addEventListener('click', ()=>forceLogoutUser(b.dataset.forcelogout)));
  $all('[data-deleteuser]').forEach(b=>b.addEventListener('click', ()=>deleteUserCompletely(b.dataset.deleteuser, users[b.dataset.deleteuser])));
}
// تحويل دور المستخدم — بيفك أي ربط طالب/معلمة قديم تلقائيًا عشان منسيبش بيانات معلّقة

      updates['studentTeacher/'+uid] = null;
    }
    await db.ref().update(updates);
    toast('تم تحويل الدور');

// إعادة تعيين كلمة المرور: بيرسل رابط Firebase القياسي لبريد الحساب الداخلي (username@rawasekh.app).
// ملاحظة مهمة: طالما الحسابات بتستخدم بريد داخلي وهمي (مش بريد حقيقي للمستخدم)، الرابط ده
// هيتبعت لصندوق بريد مالوش صاحب فعليًا. تفعيل إعادة تعيين حقيقية للمستخدم يحتاج إما بريد
// استرجاع حقيقي مخزّن في الملف الشخصي، أو Cloud Function بصلاحيات Admin SDK لتغيير كلمة
// المرور مباشرة (التطبيق ده ملف واحد بدون سيرفر فمفيش وصول لـ Admin SDK من هنا).
async function resetUserPassword(u){
  if(!u || !u.username){ toast('لا يوجد اسم مستخدم لهذا الحساب'); return; }
  if(!confirm('سيتم إرسال رابط إعادة تعيين كلمة المرور القياسي من Firebase. تنبيه: الحسابات هنا تستخدم بريدًا داخليًا وهميًا، فهذا الرابط لن يصل لصندوق بريد حقيقي للمستخدم إلا لو تم ربط بريد استرجاع حقيقي لاحقًا. متابعة؟')) return;
  try{ await auth.sendPasswordResetEmail(usernameToEmail(u.username)); toast('تم إرسال طلب إعادة التعيين لبريد الحساب الداخلي'); }
  catch(e){ toast('تعذر الإرسال: '+(e.message||'')); }
}
// إجبار تسجيل الخروج: بيسجّل وقت الأمر في users/{uid}/forceLogoutAt، والمستمع الدائم على
// بروفايل المستخدم (auth.onAuthStateChanged) بيقارنه بلحظة بداية جلسته الحالية ويسجّل خروجه
// فورًا لو الأمر أحدث من دخوله — بيشتغل بمجرد ما يوصل التحديث Realtime، من غير أي تحديث يدوي للصفحة.
async function forceLogoutUser(uid){
  if(!confirm('إجبار هذا المستخدم على تسجيل الخروج الآن؟')) return;
  try{ await db.ref('users/'+uid).update({forceLogoutAt: firebase.database.ServerValue.TIMESTAMP}); toast('تم إرسال أمر تسجيل الخروج'); }
  catch(e){ toast('تعذر التنفيذ: '+(e.message||'')); }
}
// حذف مستخدم بالكامل: البروفايل، اسم المستخدم المحجوز، الحضور، التقدم، روابط التدريس/المتابعة،
// محادثاته ومكالماته مع الطرف المرتبط به (ملفات الشات المرفوعة كمان تتحذف من Storage قبل حذف الثريد).
// ملاحظة مهمة: العميل (Client SDK) مينفعش يحذف حساب مستخدم *تاني* من Firebase Authentication —
// ده متاح بس للمستخدم يحذف حساب نفسه، أو عبر Admin SDK من سيرفر/Cloud Function. الحذف هنا بيمسح
// كل بيانات الحساب فعليًا ويمنعه نهائيًا من الوصول لأي شيء في التطبيق، لكن سجل الدخول (Email/Password)
// هيفضل موجود في Firebase Authentication نفسه حتى تضيفوا Cloud Function لحذفه من هناك كمان.
async function deleteUserCompletely(uid, u){
  if(!u) return;
  if(!confirm(`سيتم حذف حساب "${u.name}" وكل بياناته (محادثات، مكالمات، ${u.role==='teacher'?'روابط طلابه':'تقدمه وربطه بمعلمته'}) نهائيًا. لا يمكن التراجع.\n\nملاحظة: هذا لا يحذف الحساب من Firebase Authentication نفسه (يتطلب Cloud Function من السيرفر)، لكنه سيُقفل نهائيًا وتُمسح كل بياناته.\n\nمتابعة؟`)) return;
  try{
    const updates = {};
    updates['users/'+uid] = null;
    updates['presence/'+uid] = null;
    updates['progress/'+uid] = null;
    if(u.username) updates['usernames/'+u.username] = null;

    let peers = [];
    if(u.role==='teacher'){
      const aSnap = await db.ref('assignments/'+uid).get();
      const myStudents = Object.keys(aSnap.val()||{});
      peers = myStudents;
      updates['assignments/'+uid] = null;
      for(const sid of myStudents){
        const stSnap = await db.ref('studentTeacher/'+sid).get();
        if(stSnap.val()===uid) updates['studentTeacher/'+sid] = null;
      }
    } else if(u.role==='student'){
      const stSnap = await db.ref('studentTeacher/'+uid).get();
      const myTeacher = stSnap.val();
      if(myTeacher){ peers = [myTeacher]; updates['assignments/'+myTeacher+'/'+uid] = null; }
      updates['studentTeacher/'+uid] = null;
    }

    for(const peer of peers){
      const chatId = pairId(uid, peer);
      try{
        const msgsSnap = await db.ref('chatThreads/'+chatId+'/messages').get();
        const msgs = msgsSnap.val()||{};
        await Promise.all(Object.values(msgs).map(async m=>{
          if((m.type==='image'||m.type==='file') && m.url){
            try{ await storage.refFromURL(m.url).delete(); }catch(_){ /* أفضل محاولة فقط — لو الملف مش موجود أو الصلاحية مرفوضة، نكمل */ }
          }
        }));
      }catch(_){}
      updates['chatThreads/'+chatId] = null;
      updates['calls/'+chatId] = null;
    }

    await db.ref().update(updates);
    toast('تم حذف الحساب وكل بياناته');
    await loadAdminUsers();
  }catch(e){ toast('تعذر حذف الحساب بالكامل: '+(e.message||'')); }
}

  const teachers = Object.entries(users).filter(([,u])=>u.role==='teacher');
  const students = Object.entries(users).filter(([,u])=>u.role==='student');
  $('#assignArea').innerHTML = teachers.map(([tid,t])=>{
    const myStudents = assignments[tid]?Object.keys(assignments[tid]):[];
    return `<div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="avatar">${initials(t.name)}</div>
        <div><b>${esc(t.name)}</b><br><span style="font-size:12px;color:var(--text-dim)">${myStudents.length} طالب مخصص</span></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${students.map(([sid,s])=>`
          <label style="display:flex;align-items:center;gap:6px;background:var(--surface-2);padding:6px 10px;border-radius:10px;font-size:13px">
            <input type="checkbox" data-assign-t="${tid}" data-assign-s="${sid}" ${myStudents.includes(sid)?'checked':''}> ${esc(s.name)}
          </label>`).join('')}
      </div>
    </div>`;
  }).join('') || '<div class="empty-state">لا توجد معلمات بعد</div>';
  $all('[data-assign-t]').forEach(chk=>chk.addEventListener('change', async ()=>{
    const t=chk.dataset.assignT, s=chk.dataset.assignS;
    chk.disabled = true;
    try{
      if(chk.checked){
        // كل طالب مربوط بمعلمة واحدة بس، فلو كان مربوط بمعلمة تانية نفصله منها الأول
        const curSnap = await db.ref(`studentTeacher/${s}`).get();
        const prevT = curSnap.val();
        if(prevT && prevT!==t){
          await db.ref(`assignments/${prevT}/${s}`).remove();
          const prevChk = document.querySelector(`[data-assign-t="${prevT}"][data-assign-s="${s}"]`);
          if(prevChk) prevChk.checked = false;
        }
        await db.ref(`assignments/${t}/${s}`).set(true);
        await db.ref(`studentTeacher/${s}`).set(t); // فهرس عكسي: الطالب يقرأ سطر واحد بس مش كل شجرة assignments
      } else {
        await db.ref(`assignments/${t}/${s}`).remove();
        const cur = await db.ref(`studentTeacher/${s}`).get();
        if(cur.exists() && cur.val()===t) await db.ref(`studentTeacher/${s}`).remove();
      }
      toast('تم تحديث الربط');
    }catch(e){
      chk.checked = !chk.checked;
      toast('تعذر تحديث الربط: '+(e.message||''));
    } finally { chk.disabled = false; }
  }));
  }catch(e){ showLoadError('assignArea', e); }
}

async function loadTeacherStudents(){
  try{
  const myUid = state.user.uid;
  const assignSnap = await db.ref('assignments/'+myUid).get();
  const myStudentIds = Object.keys(assignSnap.val()||{});
  if(!myStudentIds.length){ $('#myStudentsList').innerHTML = '<div class="empty-state"><span class="emoji">🌙</span>لا يوجد طلاب مخصصين لك بعد</div>'; return; }
  // نجيب بس بيانات الطلاب المخصصين لينا (مش شجرة /users أو /presence أو /progress كاملة)
  const perStudent = await Promise.all(myStudentIds.map(sid=>Promise.all([
    db.ref('users/'+sid).get(), db.ref('presence/'+sid).get(), db.ref('progress/'+sid).get()
  ])));
  const users={}, presence={}, progress={};
  myStudentIds.forEach((sid,i)=>{
    users[sid]=perStudent[i][0].val()||{}; presence[sid]=perStudent[i][1].val()||{}; progress[sid]=perStudent[i][2].val()||{};
  });
  $('#myStudentsList').innerHTML = myStudentIds.map(sid=>{
    const s = users[sid]||{name:'طالب'};
    const online = presence[sid]?.online;
    const pct = progress[sid]?.totalPercent || 0;
    return `<div class="list-item" data-open-student="${sid}" data-name="${esc(s.name)}">
      <div class="avatar">${initials(s.name)}<span class="dot ${online?'online':''}"></span></div>

      </div>
      <div class="li-meta"><span class="chip ${online?'ok':'neutral'}">${online?'متصل الآن':'غير متصل'}</span></div>

  }).join('');
  $all('[data-open-student]').forEach(el=>el.addEventListener('click', ()=>{
    teacherActiveStudent = {uid: el.dataset.openStudent, name: el.dataset.name};
    teacherView='profile'; render();
  }));

      <button class="attach-btn" id="btnAttachFile" title="إرسال صورة أو ملف">📎</button>
      <textarea id="chatInput" rows="1" placeholder="اكتب رسالتك..."></textarea>
      <button class="send-btn" id="btnSendMsg">➤</button>
    </div>
  </div>`;
}
function bindChatEvents(){
  const o = state.chatWith;
  $('#btnCloseChat').addEventListener('click', closeChat);
  $('#btnCallFromChat').addEventListener('click', ()=>startCall(o.uid, o.name));
  $('#btnSendMsg').addEventListener('click', sendChatMessage);
  $('#chatInput').addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendChatMessage(); } });
  $('#btnAttachFile').addEventListener('click', ()=> $('#chatFileInput').click());
  $('#chatFileInput').addEventListener('change', e=>{
    const file = e.target.files[0];
    e.target.value='';
    if(file) uploadChatFile(file);
  });
  // حالة الاتصال بشكل لحظي (مش مرة واحدة بس)
  const presRef = db.ref('presence/'+o.uid);
  state.chatPresenceRef = presRef;
  presRef.on('value', snap=>{
    const p = snap.val();
    $('#chatOnlineDot')?.classList.toggle('online', !!p?.online);
    if($('#chatOnlineText')) $('#chatOnlineText').textContent = p?.online ? 'متصل الآن' : 'غير متصل';
  });
  const chatId = pairId(state.user.uid, o.uid);
  const msgsRef = db.ref('chatThreads/'+chatId+'/messages');
  state.msgsRef = msgsRef;
  msgsRef.limitToLast(200).on('value', snap=>{
    const msgs = snap.val()||{};
    const body = $('#chatBody');
    if(!body) return;
    const entries = Object.entries(msgs).sort((a,b)=>(a[1].ts||0)-(b[1].ts||0));
    body.innerHTML = entries.map(([id,m])=> renderChatBubble(m)).join('') || `<div class="bubble system">ابدأ المحادثة الآن 🌙</div>`;
    body.scrollTop = body.scrollHeight;
    // تحديث حالة القراءة للرسائل الواردة
    entries.forEach(([id,m])=>{ if(m.senderUid!==state.user.uid && !m.read){ db.ref(`chatThreads/${chatId}/messages/${id}/read`).set(true); } });
    $all('.chat-img', body).forEach(img=> img.addEventListener('click', ()=> openImgViewer(img.dataset.full||img.src)));
  });
}
function renderChatBubble(m){
  const mine = m.senderUid===state.user.uid;
  const tick = mine ? (' '+(m.read?'✓✓':'✓')) : '';
  if(m.type==='image'){
    return `<div class="bubble media ${mine?'me':'them'}">
      <div class="chat-img-wrap">
        <img class="chat-img" src="${esc(m.url)}" data-full="${esc(m.url)}" loading="lazy">
        <div class="meta">${fmtTime(m.ts)}${tick}</div>
      </div>
    </div>`;
  }
  if(m.type==='file'){
    return `<div class="bubble file-bubble ${mine?'me':'them'}">
      <div class="file-ic">📄</div>
      <div class="file-info"><b>${esc(m.fileName||'ملف')}</b><span>${fmtBytes(m.fileSize)}</span></div>
      <a class="file-dl" href="${esc(m.url)}" target="_blank" rel="noopener" download>⬇️</a>
    </div>`;
  }
  return `<div class="bubble ${mine?'me':'them'}">${esc(m.text)}<div class="meta">${fmtTime(m.ts)}${tick}</div></div>`;
}
async function sendChatMessage(){
  const input = $('#chatInput'); const text = input.value.trim();
  if(!text) return;
  const o = state.chatWith; const chatId = pairId(state.user.uid, o.uid);
  input.value='';
  try{
    await db.ref('chatThreads/'+chatId+'/messages').push({ senderUid: state.user.uid, type:'text', text, ts: firebase.database.ServerValue.TIMESTAMP, read:false });
  }catch(e){ toast('تعذر إرسال الرسالة'); }
}
const MAX_CHAT_FILE_MB = 15;
async function uploadChatFile(file){
  const o = state.chatWith; if(!o) return;
  if(file.size > MAX_CHAT_FILE_MB*1024*1024){ toast(`الملف كبير جدًا (الحد الأقصى ${MAX_CHAT_FILE_MB}MB)`); return; }
  const chatId = pairId(state.user.uid, o.uid);
  const isImage = file.type.startsWith('image/');
  const safeName = file.name.replace(/[^a-zA-Z0-9_.\-\u0600-\u06FF]/g,'_');
  const path = `chatFiles/${chatId}/${Date.now()}_${safeName}`;
  const wrap = $('#uploadProgressWrap'), fill = $('#uploadProgressFill');
  if(wrap) wrap.style.display='block';
  try{
    const ref = storage.ref().child(path);
    const task = ref.put(file, {contentType: file.type||'application/octet-stream'});
    task.on('state_changed', snap=>{
      const pct = snap.totalBytes ? Math.round((snap.bytesTransferred/snap.totalBytes)*100) : 0;
      if(fill) fill.style.width = pct+'%';
    });
    await task;
    const url = await ref.getDownloadURL();
    await db.ref('chatThreads/'+chatId+'/messages').push({
      senderUid: state.user.uid, type: isImage?'image':'file', url,
      fileName: file.name, fileSize: file.size, mimeType: file.type||null,
      ts: firebase.database.ServerValue.TIMESTAMP, read:false
    });
  }catch(e){
    console.error(e);
    toast('تعذر رفع الملف: ' + (e.message||''));
  } finally {
    if(wrap){ wrap.style.display='none'; if(fill) fill.style.width='0%'; }
  }
}

/* =====[ SECTION: CALLS (AGORA) ]===== */
function hashUidToNumber(uid){
  let h = 0; for(let i=0;i<uid.length;i++){ h = (h*31 + uid.charCodeAt(i)) >>> 0; }
  return (h % 2147483000) + 1;
}
// App ID فقط: بدون توكن، لازم يتلغى App Certificate من Agora Console (Authentication -> App ID)
async function startCall(otherUid, otherName){
  const callId = pairId(state.user.uid, otherUid);
  const channel = 'channel_'+callId;
  try{
    await db.ref('calls/'+callId).set({ from: state.user.uid, to: otherUid, status:'ringing', channel, ts: firebase.database.ServerValue.TIMESTAMP });
  }catch(e){ toast('تعذر بدء المكالمة'); return; }
  openCallOverlay({uid:otherUid, name:otherName}, 'outgoing', callId, channel);
  const callRef = db.ref('calls/'+callId);
  const cb = snap=>{
    const c = snap.val();
    if(!c) return;
    if(c.status==='rejected'){ toast(otherName+' رفض/ت المكالمة'); endCallUI(callId); }
    if(c.status==='accepted'){ joinAgoraChannel(channel); }
    if(c.status==='ended'){ endCallUI(callId); }
  };
  callRef.on('value', cb);
  state._activeCallSessionWatcher = {callId, ref: callRef, cb};
}

// عيب #11 (مُصلَح): كانت قائمة "المكالمات الواردة" بتتبني مرة واحدة بس لحظة
// تسجيل الدخول (get() وحيدة). لو الأدمن غيّر ربط الطالب بمعلمة تانية والطالب
// فاتح التطبيق فعلاً، مكنش هيستقبل أي مكالمة من المعلمة الجديدة إلا بعد
// Refresh كامل للصفحة. دلوقتي بقى في مستمع Realtime دائم على studentTeacher/
// (للطالب) أو assignments/ (للمعلمة)، وأي تغيير فيهم يعيد بناء مستمعي
// المكالمات فورًا بدون أي تحديث للصفحة.
let callPeerWatchRef = null;
function teardownCallPeerWatch(){
  if(callPeerWatchRef){ callPeerWatchRef.ref.off('value', callPeerWatchRef.cb); callPeerWatchRef=null; }
}
function listenIncomingCalls(){
  teardownCallPeerWatch();
  const myUid = state.user.uid;
  if(state.profile.role==='student'){
    const ref = db.ref('studentTeacher/'+myUid);
    const cb = snap=>{ myTeacherCache = snap.val()||null; setupCallListenersForPeers(myTeacherCache ? [myTeacherCache] : []); };
    ref.on('value', cb);
    callPeerWatchRef = {ref, cb};
  } else if(state.profile.role==='teacher'){
    const ref = db.ref('assignments/'+myUid);
    const cb = snap=>{ setupCallListenersForPeers(Object.keys(snap.val()||{})); };
    ref.on('value', cb);
    callPeerWatchRef = {ref, cb};
  } else {
    setupCallListenersForPeers([]);
  }
}
function setupCallListenersForPeers(peers){
  teardownCallListener();
  const myUid = state.user.uid;
  state._callListeners = state._callListeners || [];
  peers.forEach(peerUid=>{
    const callId = pairId(myUid, peerUid);
    const ref = db.ref('calls/'+callId);
    const cb = snap=>{
      const c = snap.val();
      if(!c) return;
      if(c.status==='ringing' && c.to===myUid){ showIncomingBanner(peerUid, callId, c.channel); }
      if(c.status==='ended' || c.status==='rejected'){
        hideIncomingBanner();
        // عيب مُصلَح (تسريب موارد/Memory Leak): الطرف اللي مقفلّوش المكالمة بنفسه
        // (يعني مش اللي دوس على "إنهاء") كان مستمعه القديم بيعمل فقط hideIncomingBanner()
        // من غير ما يقفل شاشة المكالمة أو يسيب الـ Agora channel أو يوقف الميكروفون —
        // فتفضل شاشة "المكالمة جارية" عالقة والموارد شغالة في الخلفية عند الطرف التاني.
        if(state.currentCallId===callId){ endCallUI(callId); }
      }
    };
    ref.on('value', cb);
    state._callListeners.push({ref, cb});
  });
}
function teardownCallListener(){
  (state._callListeners||[]).forEach(({ref,cb})=>ref.off('value',cb));
  state._callListeners = [];
}
async function showIncomingBanner(fromUid, callId, channel){
  const snap = await db.ref('users/'+fromUid).get();
  const name = (snap.val()||{}).name || 'مكالمة واردة';
  const banner = $('#incomingBanner');
  banner.innerHTML = `
    <div class="avatar">${initials(name)}</div>
    <div class="li-body"><b>${esc(name)}</b><span>مكالمة صوتية واردة...</span></div>
    <button class="call-btn accept" style="width:44px;height:44px;font-size:16px" id="btnAcceptIncoming">✓</button>
    <button class="call-btn reject" style="width:44px;height:44px;font-size:16px" id="btnRejectIncoming">✕</button>`;
  banner.classList.add('active');
  $('#btnAcceptIncoming').onclick = async ()=>{
    banner.classList.remove('active');
    await db.ref('calls/'+callId).update({status:'accepted'});
    openCallOverlay({uid:fromUid, name}, 'incoming', callId, channel);
    joinAgoraChannel(channel);
  };
  $('#btnRejectIncoming').onclick = async ()=>{
    banner.classList.remove('active');
    await db.ref('calls/'+callId).update({status:'rejected'});
  };
}
function hideIncomingBanner(){ $('#incomingBanner').classList.remove('active'); }

function openCallOverlay(peer, mode, callId, channel){
  state.currentCallId = callId;
  const overlay = $('#callOverlay');
  overlay.innerHTML = `
    <div></div>
    <div class="pulse-ring"><div class="avatar" style="width:110px;height:110px;font-size:38px">${initials(peer.name)}</div></div>
    <div>
      <div class="call-name">${esc(peer.name)}</div>
      <div class="call-status" id="callStatusText">${mode==='outgoing'?'جارِ الاتصال...':'متصل'}</div>
      <div class="call-timer" id="callTimerText" style="display:none">00:00</div>
    </div>
    <div class="call-actions">
      <button class="call-btn mute" id="btnMuteCall">🎙️</button>
      <button class="call-btn end" id="btnEndCall">☎</button>
    </div>`;
  overlay.classList.add('active');
  $('#btnEndCall').onclick = ()=>{ db.ref('calls/'+callId).update({status:'ended'}); endCallUI(callId); };
  $('#btnMuteCall').onclick = (e)=>{
    const btn = e.currentTarget; const muted = btn.classList.toggle('active');
    if(state.localAudioTrack) state.localAudioTrack.setEnabled(!muted);
    btn.textContent = muted ? '🔇' : '🎙️';
  };
}
async function joinAgoraChannel(channel){
  try{
    const numericUid = hashUidToNumber(state.user.uid);
    state.agoraClient = AgoraRTC.createClient({mode:'rtc', codec:'vp8'});
    await state.agoraClient.join(AGORA_APP_ID, channel, null, numericUid);
    state.localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
    await state.agoraClient.publish([state.localAudioTrack]);
    state.agoraClient.on('user-published', async (user, mediaType)=>{
      await state.agoraClient.subscribe(user, mediaType);
      if(mediaType==='audio') user.audioTrack.play();
    });
    $('#callStatusText').style.display='none';
    $('#callTimerText').style.display='block';
    state.callSeconds = 0;
    state.callTimerInt = setInterval(()=>{ state.callSeconds++; const el=$('#callTimerText'); if(el) el.textContent=fmtDuration(state.callSeconds); }, 1000);
  }catch(e){
    console.error(e);
    toast('تعذر الدخول على المكالمة — تأكد إن App Certificate ملغي من Agora Console');
  }
}
async function endCallUI(callId){
  hideIncomingBanner();
  $('#callOverlay').classList.remove('active');
  clearInterval(state.callTimerInt); state.callTimerInt=null;
  if(state.localAudioTrack){ state.localAudioTrack.close(); state.localAudioTrack=null; }
  if(state.agoraClient){ try{ await state.agoraClient.leave(); }catch(e){} state.agoraClient=null; }
  // كان قبل كده: db.ref('calls/'+callId).off() بدون تحديد — وده يشيل *كل*
  // المستمعين على المسار ده، بما فيهم مستمع "المكالمات الواردة" الدائم.
  // دلوقتي بنشيل فقط مستمع الجلسة المؤقتة اللي عملها startCall (لو موجود لنفس الـ callId).
  if(state._activeCallSessionWatcher && state._activeCallSessionWatcher.callId===callId){
    state._activeCallSessionWatcher.ref.off('value', state._activeCallSessionWatcher.cb);
    state._activeCallSessionWatcher = null;
  }
  state.currentCallId = null;
}

/* =====[ SECTION: BOOTSTRAP ]===== */
render();
</script>
